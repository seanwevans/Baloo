name: Baloo CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Reduced from 20 to fail faster on hangs

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        # Combined installation of build, test, and debugging tools
        sudo apt-get install -y nasm bats strace

    - name: Install bats helpers
      run: |
        mkdir -p tests/test_helper
        # Use shallow clones (--depth 1) for significantly faster downloads
        git clone --depth 1 https://github.com/bats-core/bats-support.git tests/test_helper/bats-support
        git clone --depth 1 https://github.com/bats-core/bats-assert.git tests/test_helper/bats-assert

    - name: Compile
      # make clean is unnecessary on a fresh GitHub-hosted runner, went straight to make
      run: make

    - name: Run Tests
      timeout-minutes: 5
      # Removed the 'timeout' utility wrapper since GitHub Actions provides native step timeouts
      run: make test TEST_FLAGS="--timing --print-output-on-failure"
