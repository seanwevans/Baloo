name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y nasm
    - name: Clean
      run: make clean
    - name: Compile
      run: make
    - name: Install test dependencies
      run: |
        sudo apt-get install -y bats bats-assert bats-support
        mkdir -p tests/test_helper

        support_root="$(dpkg -L bats-support | awk '/\/load$/ { sub(/\/load$/, ""); print; exit }')"
        assert_root="$(dpkg -L bats-assert | awk '/\/load$/ { sub(/\/load$/, ""); print; exit }')"

        test -n "$support_root"
        test -n "$assert_root"

        ln -sfn "$support_root" tests/test_helper/bats-support
        ln -sfn "$assert_root" tests/test_helper/bats-assert
    - name: Test
      run: make test
